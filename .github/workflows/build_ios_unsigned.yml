name: Build Unsigned iOS IPA

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-ios-unsigned:
    name: Build unsigned IPA
    runs-on: macos-15
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          architecture: x64
          cache: true

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,x86_64-apple-ios

      - name: Cache Flutter pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-flutter-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-pub-

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Cache Flutter Rust Bridge CLI
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/flutter_rust_bridge_codegen
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: ${{ runner.os }}-frb-cli-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-frb-cli-

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            rust
            rust_builder
          cache-on-failure: true

      - name: Install flutter_rust_bridge_codegen
        run: |
          if ! command -v flutter_rust_bridge_codegen >/dev/null 2>&1; then
            cargo install flutter_rust_bridge_codegen
          fi

      - name: Print tool versions
        run: |
          xcodebuild -version
          flutter --version
          rustc --version

      - name: Fetch Flutter dependencies
        run: flutter pub get

      - name: Clean stale iOS build artifacts
        run: |
          rm -rf build/ios/iphoneos/Runner.app
          rm -rf ios/Pods
          rm -rf ~/Library/Developer/Xcode/DerivedData/Runner-*

      - name: Build iOS app without signing
        run: |
          set +e
          flutter build ios --release --no-codesign --no-pub
          BUILD_STATUS=$?
          set -e

          print_runner_candidates() {
            echo "Runner.app candidates:"
            find build/ios ios/build "$HOME/Library/Developer/Xcode/DerivedData" -path "*/Runner.app" -type d -print 2>/dev/null | while IFS= read -r app; do
              echo "- $app"
              if [ -d "$app/Frameworks" ]; then
                find "$app/Frameworks" -maxdepth 1 -name "*.framework" -type d -print 2>/dev/null | sed 's#^.*/##' | sort | tr '\n' ' '
                echo
              else
                echo "  no Frameworks directory"
              fi
            done
          }

          select_runner_app() {
            find build/ios ios/build "$HOME/Library/Developer/Xcode/DerivedData" -path "*/Runner.app" -type d -print 2>/dev/null | while IFS= read -r app; do
              framework_count=0
              if [ -d "$app/Frameworks" ]; then
                framework_count="$(find "$app/Frameworks" -maxdepth 1 -name "*.framework" -type d -print 2>/dev/null | wc -l | tr -d ' ')"
              fi

              has_ass=0
              if [ -f "$app/Frameworks/Ass.framework/Ass" ]; then
                has_ass=1
              fi

              printf "%s\t%s\t%s\n" "$has_ass" "$framework_count" "$app"
            done | sort -r -k1,1n -k2,2n | awk -F '\t' 'NR == 1 { print $3 }'
          }

          RUNNER_APP_PATH="$(select_runner_app || true)"

          if [ -z "$RUNNER_APP_PATH" ]; then
            print_runner_candidates
            if [ "$BUILD_STATUS" -ne 0 ]; then
              exit "$BUILD_STATUS"
            fi
            exit 1
          fi

          mkdir -p build/ios/iphoneos
          if [ "$RUNNER_APP_PATH" != "build/ios/iphoneos/Runner.app" ]; then
            rm -rf build/ios/iphoneos/Runner.app
            cp -R "$RUNNER_APP_PATH" build/ios/iphoneos/Runner.app
          fi

          TARGET_APP="build/ios/iphoneos/Runner.app"
          mkdir -p "$TARGET_APP/Frameworks"

          echo "Using Runner.app from: $RUNNER_APP_PATH"
          echo "Embedding Release-iphoneos CocoaPods frameworks into Runner.app..."
          find build/ios "$HOME/Library/Developer/Xcode/DerivedData" -path "*/Release-iphoneos/*.framework" -type d -print 2>/dev/null | while IFS= read -r framework; do
            case "$framework" in
              *"/Runner.app/"*) continue ;;
            esac

            name="$(basename "$framework")"
            if [ ! -d "$TARGET_APP/Frameworks/$name" ]; then
              ditto "$framework" "$TARGET_APP/Frameworks/$name"
              echo "Embedded $name"
            fi
          done

          find build/ios "$HOME/Library/Developer/Xcode/DerivedData" -path "*/Release-iphoneos/*.dylib" -type f -print 2>/dev/null | while IFS= read -r dylib; do
            case "$dylib" in
              *"/Runner.app/"*) continue ;;
            esac

            name="$(basename "$dylib")"
            if [ ! -f "$TARGET_APP/Frameworks/$name" ]; then
              ditto "$dylib" "$TARGET_APP/Frameworks/$name"
              echo "Embedded $name"
            fi
          done

          echo "Final embedded frameworks:"
          find "$TARGET_APP/Frameworks" -maxdepth 1 -name "*.framework" -type d -print 2>/dev/null | sed 's#^.*/##' | sort

          if [ ! -f "$TARGET_APP/Frameworks/Ass.framework/Ass" ]; then
            echo "Ass.framework is missing from the unsigned app bundle."
            print_runner_candidates
            exit 1
          fi

          if [ "$BUILD_STATUS" -ne 0 ]; then
            echo "Flutter returned $BUILD_STATUS after producing Runner.app; continuing unsigned IPA packaging."
          fi

      - name: Package unsigned IPA
        run: |
          rm -rf build/ios/ipa_unsigned
          mkdir -p build/ios/ipa_unsigned/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/ipa_unsigned/Payload/Runner.app
          APP_PATH="build/ios/ipa_unsigned/Payload/Runner.app"
          find "$APP_PATH" -name "_CodeSignature" -type d -prune -exec rm -rf {} +
          find "$APP_PATH" -name "CodeResources" -type f -delete
          find "$APP_PATH" -name "*.xcent" -type f -delete
          rm -f "$APP_PATH/embedded.mobileprovision"
          cd build/ios/ipa_unsigned
          ditto -c -k --sequesterRsrc --keepParent Payload ../Windyomi-unsigned-ios.ipa

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: Windyomi-unsigned-ios
          path: build/ios/Windyomi-unsigned-ios.ipa
          retention-days: 14
