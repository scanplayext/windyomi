name: Build Unsigned iOS IPA

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-ios-unsigned:
    name: Build unsigned IPA
    runs-on: macos-15
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          architecture: x64
          cache: true

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,x86_64-apple-ios

      - name: Cache Flutter pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-flutter-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-pub-

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/CocoaPods
            ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            rust
            rust_builder
          cache-on-failure: true

      - name: Install flutter_rust_bridge_codegen
        run: |
          if ! command -v flutter_rust_bridge_codegen >/dev/null 2>&1; then
            cargo install flutter_rust_bridge_codegen
          fi

      - name: Print tool versions
        run: |
          xcodebuild -version
          flutter --version
          rustc --version

      - name: Fetch Flutter dependencies
        run: flutter pub get

      - name: Build iOS app without signing
        run: flutter build ios --release --no-codesign

      - name: Package unsigned IPA
        run: |
          rm -rf build/ios/ipa_unsigned
          mkdir -p build/ios/ipa_unsigned/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/ipa_unsigned/Payload/Runner.app
          cd build/ios/ipa_unsigned
          zip -qry ../Windyomi-unsigned-ios.ipa Payload

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: Windyomi-unsigned-ios
          path: build/ios/Windyomi-unsigned-ios.ipa
          retention-days: 14
